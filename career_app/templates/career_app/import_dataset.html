{% extends 'career_app/base.html' %}

{% block content %}

<h2>Import Dataset</h2>

<p class="text-muted">
    Upload an Excel dataset containing sheets such as JobRoles, Skills, Tools, RoleSkills, RoleTools, and LearningResources.
</p>



<div class="card mt-4">
    <div class="card-body">

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit" class="btn btn-primary">
                Import Dataset
            </button>

            <a href="{% url 'admin_dashboard' %}" class="btn btn-secondary">
                Back to Admin Dashboard
            </a>
        </form>

    </div>
</div>

{% endblock %}
