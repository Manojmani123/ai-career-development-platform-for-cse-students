{% extends 'career_app/base.html' %}

{% block content %}

<div class="container mt-5">

    <div class="card shadow-sm">

        <div class="card-header bg-warning">
            <h3>Edit Learning Resource</h3>
        </div>

        <div class="card-body">

            <form method="POST">
                {% csrf_token %}

                {{ form.as_p }}

                <button class="btn btn-success">
                    Update Resource
                </button>

                <a href="{% url 'view_learning_resources' %}" class="btn btn-secondary">
                    Cancel
                </a>
            </form>

        </div>

    </div>

</div>

{% endblock %}
