<h1>Skills</h1>

<a href="{% url 'add_skill' %}">Add New Skill</a>

<table border="1" cellpadding="10">
    <tr>
        <th>Skill Name</th>
        <th>Category</th>
    </tr>

    {% for skill in skills %}
    <tr>
        <td>{{ skill.skill_name }}</td>
        <td>{{ skill.category }}</td>
    </tr>
    {% endfor %}
</table>

<a href="{% url 'admin_dashboard' %}">Back</a>
